# Fly.io config for Umami
# Migrations run at app startup via check-db, so we skip the release_command
app = "umami-b9tw8g"

[[vm]]
  memory = "512mb"

[build]
  dockerfile = "Dockerfile"

[env]
  HOSTNAME = "0.0.0.0"
  DATABASE_TYPE = "postgres"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Umami runs migrations at startup - needs 90s+ before it can serve traffic
  [[http_service.checks]]
  grace_period = "90s"
  interval = "15s"
  method = "GET"
  timeout = "10s"
  path = "/"

# Disable release_command - Umami runs migrations at startup via check-db
[deploy]
  release_command = "true"
  wait_timeout = "10m"
