# Fly.io config for Umami
# Migrations run at app startup via check-db, so we skip the release_command
app = "umami-b9tw8g"

[build]
  dockerfile = "Dockerfile"

[env]
  HOSTNAME = "0.0.0.0"
  DATABASE_TYPE = "postgres"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Disable release_command - Umami runs migrations at startup via check-db
[deploy]
  release_command = "true"
